<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntegralFlex Login</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    body{background:linear-gradient(135deg,#071733,#0d2b5b);min-height:100vh;display:grid;place-items:center}
    .login-wrap{width:min(460px,92%);}
    .login-card{background:#fff;border-radius:26px;padding:32px;box-shadow:0 24px 50px rgba(0,0,0,.25)}
    .login-card h1{margin:0 0 8px;color:#10213e}
    .login-card p{color:#60728d}
    .field{margin:14px 0}
    .field label{display:block;margin-bottom:8px;color:#10213e;font-weight:700}
    .field input{width:100%;padding:14px 16px;border:1px solid #d7e5ff;border-radius:14px;font-size:1rem}
    .helper{font-size:.92rem;color:#64748b;margin-top:14px}
    .back-link{display:inline-block;margin-top:16px;color:#2563eb;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="mini-brand" style="color:#10213e;margin-bottom:18px">
        <div class="brand-mark">IF</div>
        <div><strong>IntegralFlex</strong><span style="color:#5a6d86">SUITES</span></div>
      </div>
      <h1>Acceso a la plataforma</h1>
      <p>Portal interno. La validación real se puede conectar aquí sin exponer credenciales en la landing comercial.</p>
      <form>
        <div class="field">
          <label>RUT</label>
          <input type="text" placeholder="13991430-9" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" placeholder="••••••••••" />
        </div>
        <button class="btn btn-primary full" type="button">Ingresar</button>
      </form>
      <p class="helper">Este portal quedó separado del sitio comercial principal.</p>
      <a class="back-link" href="../index.html">← Volver al sitio</a>
    </div>
  </div>
</body>
</html>
