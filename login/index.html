<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntegralFlex | Acceso</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">IntegralFlex</div>
    <h1>Acceso a la plataforma</h1>
    <p>Ingresa con tu RUT y contraseña para acceder a tus módulos.</p>

    <form id="loginForm" class="login-form">
      <label for="rut">RUT</label>
      <input id="rut" name="rut" type="text" placeholder="12.345.678-9" required />

      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" placeholder="••••••••" required />

      <button type="submit">Ingresar</button>
      <div id="message" class="message"></div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = document.getElementById('message');
      message.textContent = 'Validando acceso...';
      message.className = 'message';

      try {
        const response = await fetch('/.netlify/functions/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            rut: document.getElementById('rut').value.trim(),
            password: document.getElementById('password').value
          })
        });

        const data = await response.json();
        if (!response.ok || !data.success) {
          message.textContent = data.message || 'Credenciales incorrectas';
          message.className = 'message error';
          return;
        }

        localStorage.setItem('integralflex_user', JSON.stringify(data.user));
        window.location.href = '/dashboard/';
      } catch (error) {
        message.textContent = 'No fue posible conectar con el servidor.';
        message.className = 'message error';
      }
    });
  </script>
</body>
</html>
