<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntegralFlex Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    body{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#0a2345 0%,#041124 55%)}
    .login-shell{width:min(520px,92%);padding:18px;border-radius:32px;background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.10);box-shadow:0 18px 50px rgba(0,0,0,.28)}
    .login-card{background:#fff;border-radius:26px;padding:30px;color:#10213e}
    .login-logo{height:82px;margin:0 auto 10px}
    .login-card h1{margin:0 0 8px;text-align:center;font-size:2rem}
    .login-card p{text-align:center;color:#60728d;line-height:1.7}
    .field{margin:14px 0}
    .field label{display:block;font-weight:700;margin-bottom:8px}
    .field input{width:100%;padding:14px 16px;border-radius:16px;border:1px solid #d9e7ff;font:inherit}
    .portal-actions{display:grid;gap:12px;margin-top:18px}
    .back{display:block;text-align:center;margin-top:18px;color:#2563eb;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <img src="../assets/img/logo-integralflex.png" alt="IntegralFlex Suites" class="login-logo" />
      <h1>Portal IntegralFlex</h1>
      <p>Portal interno desacoplado del sitio comercial. Aquí puedes integrar autenticación real, SSO o acceso multiempresa cuando decidas implementarlo.</p>
      <div class="field">
        <label>Correo electrónico o RUT</label>
        <input type="text" placeholder="13991430-9" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••••" />
      </div>
      <div class="portal-actions">
        <a href="../dashboard/" class="btn btn-primary">Ingresar a la plataforma</a>
        <a href="../index.html" class="btn btn-secondary" style="color:#10213e">Volver al sitio comercial</a>
      </div>
      <a href="../index.html" class="back">← Regresar</a>
    </div>
  </div>
</body>
</html>
