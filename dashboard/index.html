<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntegralFlex Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    body{background:#eef5ff;margin:0}
    .frame{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .side{background:linear-gradient(180deg,#0b2c6b,#08214c);padding:24px;color:#fff}
    .side img{height:64px;margin-bottom:18px}
    .side nav a{display:block;color:#d6e6ff;text-decoration:none;margin:10px 0;padding:12px 14px;border-radius:12px;font-weight:700}
    .side nav a.active{background:rgba(255,255,255,.12)}
    .main{padding:24px}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .metric{padding:18px;border-radius:18px;color:#fff;font-weight:800}
    .metric strong{display:block;font-size:2rem}
    .blue{background:linear-gradient(135deg,#1d6cf0,#2563eb)}
    .green{background:linear-gradient(135deg,#17944f,#22c55e)}
    .orange{background:linear-gradient(135deg,#ef6c00,#fb923c)}
    .teal{background:linear-gradient(135deg,#0f8b6d,#10b981)}
    @media(max-width:900px){.frame{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}}
    @media(max-width:600px){.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="frame">
    <aside class="side">
      <img src="../assets/img/logo-integralflex.png" alt="IntegralFlex" />
      <nav>
        <a class="active" href="#">Dashboard</a>
        <a href="https://www.servicesdesk.cl/" target="_blank" rel="noopener noreferrer">ServiceDesk</a>
        <a href="http://4.186.27.1:5005/" target="_blank" rel="noopener noreferrer">LogisDesk</a>
        <a href="http://portaldocumental.hidronor.cl/" target="_blank" rel="noopener noreferrer">CentralDesk</a>
        <a href="https://www.certidesk.cl/" target="_blank" rel="noopener noreferrer">CertiDesk</a>
      </nav>
    </aside>
    <main class="main">
      <h1>Dashboard IntegralFlex</h1>
      <p style="color:#687b95">Vista base para continuar el desarrollo interno y enlazar los módulos reales.</p>
      <div class="cards">
        <div class="metric blue"><strong>243</strong><span>Tickets activos</span></div>
        <div class="metric green"><strong>128</strong><span>Vehículos en ruta</span></div>
        <div class="metric orange"><strong>2.847</strong><span>Documentos</span></div>
        <div class="metric teal"><strong>36</strong><span>Certificados por vencer</span></div>
      </div>
    </main>
  </div>
</body>
</html>
